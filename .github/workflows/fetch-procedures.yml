name: Fetch procedures list

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch procedures from GitHub API
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.PROCEDURES_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/flavienxgrbld/procedures/contents" \
            > js/procedures-cache.json

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add js/procedures-cache.json
          git diff --staged --quiet || git commit -m "chore: update procedures cache"
          git push
