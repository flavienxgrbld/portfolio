<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="robots" content="noindex, nofollow">
<title>Page non trouvée - 404</title>
<link rel="icon" href="images/logo10.png" type="image/png">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(180deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }
    
    .container {
        text-align: center;
        max-width: 600px;
    }
    
    .error-code {
        font-size: 120px;
        font-weight: 700;
        color: #6366f1;
        line-height: 1;
        margin-bottom: 1rem;
        text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
    }
    
    h1 {
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 1rem;
        color: #fff;
    }
    
    p {
        font-size: 18px;
        color: #9ca3af;
        margin-bottom: 2rem;
        line-height: 1.6;
    }
    
    .buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
    }
    
    .btn {
        display: inline-block;
        padding: 0.875rem 2rem;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
        border-radius: 8px;
        transition: all 0.3s ease;
        cursor: pointer;
        border: none;
    }
    
    .btn-primary {
        background: #6366f1;
        color: #fff;
    }
    
    .btn-primary:hover {
        background: #4f46e5;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }
    
    .btn-secondary {
        background: rgba(99, 102, 241, 0.1);
        color: #6366f1;
        border: 2px solid #6366f1;
    }
    
    .btn-secondary:hover {
        background: rgba(99, 102, 241, 0.2);
        transform: translateY(-2px);
    }
    
    .links {
        margin-top: 3rem;
        padding-top: 2rem;
        border-top: 1px solid rgba(156, 163, 175, 0.2);
    }
    
    .links h2 {
        font-size: 18px;
        color: #9ca3af;
        margin-bottom: 1rem;
        font-weight: 400;
    }
    
    .link-list {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        flex-wrap: wrap;
    }
    
    .link-list a {
        color: #6366f1;
        text-decoration: none;
        font-size: 16px;
        transition: color 0.3s ease;
    }
    
    .link-list a:hover {
        color: #fff;
    }
    
    @media (max-width: 640px) {
        .error-code {
            font-size: 80px;
        }
        
        h1 {
            font-size: 24px;
        }
        
        p {
            font-size: 16px;
        }
        
        .buttons {
            flex-direction: column;
        }
        
        .btn {
            width: 100%;
        }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page non trouvée</h1>
        <p>Désolé, la page que vous recherchez n'existe pas ou a été déplacée. Veuillez vérifier l'URL ou retourner à la page d'accueil.</p>
        
        <div class="buttons">
            <a href="src/index.html" class="btn btn-primary">Retour à l'accueil</a>
            <button onclick="history.back()" class="btn btn-secondary">Page précédente</button>
        </div>
        
        <div class="links">
            <h2>Liens utiles</h2>
            <div class="link-list">
                <a href="src/apropos.html">À propos</a>
                <a href="src/projets.html">Projets</a>
                <a href="src/certifications.html">Certifications</a>
                <a href="src/veille.html">Veilles</a>
                <a href="src/contact.html">Contact</a>
            </div>
        </div>
    </div>
</body>
</html>
